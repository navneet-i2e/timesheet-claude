<header class="app-header" [class.header-scrolled]="isScrolled" (click)="showNotificationPanel = false">
  <!-- Top loading bar on route change -->
  <div class="loading-bar" *ngIf="isRouteLoading" style="width:100%"></div>
  <div class="header-inner">

    <!-- Brand -->
    <div class="brand" (click)="navigateTo('/dashboard')" *ngIf="brand">
      <img class="brand-logo" src="logo.png" />
      <span class="brand-name">{{ brand.name }}</span>
    </div>
    <div *ngIf="!brand" class="brand-skeleton"></div>

    <!-- Desktop Nav -->
    <nav class="nav-desktop" aria-label="Main navigation">
      <ng-container *ngIf="navItems.length > 0; else navSkeleton">
        <ng-container *ngFor="let item of navItems">
          <button *ngIf="item.id !== 'admin' || roleService.isAdmin()" class="nav-link"
            [class.nav-link--active]="isActive(item.route)" (click)="navigateTo(item.route)">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round" stroke-linejoin="round" [innerHTML]="getIconSvg(item.icon)">
            </svg>
            <span>{{ item.label }}</span>
          </button>
        </ng-container>
      </ng-container>
      <ng-template #navSkeleton>
        <div *ngFor="let i of [1,2,3,4,5]" class="nav-skel"></div>
      </ng-template>
    </nav>

    <!-- Right side controls -->
    <div class="header-actions">

      <!-- Theme toggle -->
      <button class="icon-btn theme-btn" [pTooltip]="theme.isDark() ? 'Switch to Light' : 'Switch to Dark'"
        tooltipPosition="bottom" (click)="toggleTheme()">
        <svg *ngIf="theme.isDark()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="5" />
          <line x1="12" y1="1" x2="12" y2="3" />
          <line x1="12" y1="21" x2="12" y2="23" />
          <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
          <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
          <line x1="1" y1="12" x2="3" y2="12" />
          <line x1="21" y1="12" x2="23" y2="12" />
          <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
          <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
        </svg>
        <svg *ngIf="!theme.isDark()" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
          stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
        </svg>
      </button>

      <!-- Notifications -->
      <div class="notification-container" (click)="$event.stopPropagation()">
        <button pButton type="button" icon="pi pi-bell" class="p-button-text p-button-rounded icon-btn"
          [class.bell-has-new]="getUnreadNotificationCount() > 0"
          (click)="toggleNotificationPanel()" pTooltip="Notifications" tooltipPosition="bottom">
          <span *ngIf="getUnreadNotificationCount() > 0" class="notification-dot"></span>
        </button>

        <!-- Notification Panel -->
        <div class="notification-panel" *ngIf="showNotificationPanel" (click)="$event.stopPropagation()">
          <div class="notification-header">
            <h3>Notifications</h3>
            <div class="notification-header-actions">
              <span class="unread-count" *ngIf="getUnreadNotificationCount() > 0">
                {{ getUnreadNotificationCount() }} New
              </span>
              <button class="close-btn" (click)="showNotificationPanel = false">
                <i class="pi pi-times"></i>
              </button>
            </div>
          </div>
          <div class="notification-list">
            <div *ngFor="let notif of notifications" class="notification-item" [class.unread]="!notif.read"
              (click)="markNotificationAsRead(notif)">
              <div class="notification-icon" [ngClass]="'icon-' + notif.type">
                <i [ngClass]="'pi ' + getNotificationIcon(notif.type)"></i>
              </div>
              <div class="notification-content">
                <h4 class="notification-title">{{ notif.title }}</h4>
                <p class="notification-message">{{ notif.message }}</p>
                <span class="notification-time">{{ formatNotificationTime(notif.timestamp) }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Auth -->
      <div class="auth-section" (click)="$event.stopPropagation()">
        <div *ngIf="auth.isAuthenticated$ | async; else loginBtnContainer">
          <div *ngIf="auth.user$ | async as user" style="display: flex; align-items: center; position: relative;">
            <p-avatar [label]="getInitials(user)" shape="circle" styleClass="user-avatar" (click)="menu.toggle($event)"
              style="cursor:pointer">
            </p-avatar>
            <!-- appendTo="body" is critical — renders menu outside header stacking context -->
            <p-menu #menu [model]="menuItems" [popup]="true" appendTo="body"></p-menu>
          </div>
        </div>
        <ng-template #loginBtnContainer>
          <button pButton label="Login" icon="pi pi-sign-in" class="p-button-sm p-button-outlined login-btn"
            (click)="login()">
          </button>
        </ng-template>
      </div>

      <!-- Mobile hamburger -->
      <button class="icon-btn hamburger" (click)="toggleMobileMenu()" aria-label="Menu">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6" />
          <line x1="3" y1="12" x2="21" y2="12" />
          <line x1="3" y1="18" x2="21" y2="18" />
        </svg>
      </button>
    </div>
  </div>

  <!-- Mobile menu -->
  <div class="mobile-menu" [class.mobile-menu--open]="isMobileMenuOpen">
    <ng-container *ngFor="let item of navItems">
      <button *ngIf="item.id !== 'admin' || roleService.isAdmin()" class="mobile-nav-link"
        [class.mobile-nav-link--active]="isActive(item.route)" (click)="navigateTo(item.route)">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" [innerHTML]="getIconSvg(item.icon)">
        </svg>
        {{ item.label }}
      </button>
    </ng-container>

    <!-- Mobile logout — shown only when authenticated -->
    <ng-container *ngIf="auth.isAuthenticated$ | async">
      <div class="mobile-menu-divider"></div>
      <button class="mobile-nav-link mobile-logout-btn" (click)="logout()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
          <polyline points="16 17 21 12 16 7" />
          <line x1="21" y1="12" x2="9" y2="12" />
        </svg>
        Logout
      </button>
    </ng-container>
  </div>
</header>
