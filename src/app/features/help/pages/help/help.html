<div class="help-root">
  <div class="help-header">
    <div class="help-header__icon">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
    </div>
    <div>
      <h1 class="help-title">Help &amp; Support</h1>
      <p class="help-sub">Find answers or reach out to our IT team</p>
    </div>
  </div>

  <!-- Tabs -->
  <div class="help-tabs">
    <button class="help-tab" [class.help-tab--active]="activeTab === 'faq'" (click)="activeTab = 'faq'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/>
      </svg>
      FAQ
    </button>
    <button class="help-tab" [class.help-tab--active]="activeTab === 'contact'" (click)="activeTab = 'contact'">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/>
      </svg>
      Contact IT Team
    </button>
  </div>

  <!-- FAQ Tab -->
  <div *ngIf="activeTab === 'faq'" class="faq-section">
    <div class="faq-list">
      <div *ngFor="let item of faqs" class="faq-item" [class.faq-item--open]="item.open">
        <button class="faq-question" (click)="toggle(item)">
          <span>{{ item.q }}</span>
          <svg class="faq-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>
        <div class="faq-answer" *ngIf="item.open">
          <p>{{ item.a }}</p>
        </div>
      </div>
    </div>

    <div class="help-cta">
      <p>Still have questions?</p>
      <button class="cta-btn" (click)="activeTab = 'contact'">Contact IT Team →</button>
    </div>
  </div>

  <!-- Contact Tab -->
  <div *ngIf="activeTab === 'contact'" class="contact-section">

    <!-- Success state -->
    <div *ngIf="submitted" class="contact-success">
      <div class="success-icon">
        <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
        </svg>
      </div>
      <h3>Request Submitted!</h3>
      <p>Our IT team will reach out to <strong>{{ contactForm.email }}</strong> within 1–2 business days.</p>
      <button class="cta-btn" (click)="resetContact()">Submit Another Request</button>
    </div>

    <!-- Contact form -->
    <div *ngIf="!submitted" class="contact-form-wrap">
      <div class="contact-info-bar">
        <div class="contact-info-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/>
          </svg>
          <span>it-support&#64;i2econsulting.com</span>
        </div>
        <div class="contact-info-item">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
          </svg>
          <span>Response within 1–2 business days</span>
        </div>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label>Your Name <span class="req">*</span></label>
          <input type="text" [(ngModel)]="contactForm.name" placeholder="Navneet Anand" class="form-input" />
        </div>
        <div class="form-group">
          <label>Your Email <span class="req">*</span></label>
          <input type="email" [(ngModel)]="contactForm.email" placeholder="navneet@i2econsulting.com" class="form-input" />
        </div>
        <div class="form-group">
          <label>Category</label>
          <select [(ngModel)]="contactForm.category" class="form-input">
            <option value="">Select a category…</option>
            <option *ngFor="let c of categories" [value]="c">{{ c }}</option>
          </select>
        </div>
        <div class="form-group">
          <label>Subject</label>
          <input type="text" [(ngModel)]="contactForm.subject" placeholder="Brief summary of your issue" class="form-input" />
        </div>
        <div class="form-group form-group--full">
          <label>Message <span class="req">*</span></label>
          <textarea [(ngModel)]="contactForm.message" rows="5" placeholder="Describe your issue in detail…" class="form-input form-textarea"></textarea>
        </div>
      </div>

      <div class="form-actions">
        <button class="submit-btn" (click)="submitContact()"
          [disabled]="submitting || !contactForm.name || !contactForm.email || !contactForm.message">
          <span *ngIf="!submitting">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
            </svg>
            Send to IT Team
          </span>
          <span *ngIf="submitting">Sending…</span>
        </button>
      </div>
    </div>
  </div>
</div>
